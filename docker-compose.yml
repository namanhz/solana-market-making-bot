version: '3.8'

services:
  solana-mm-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solana-market-making-bot
    restart: unless-stopped
    ports:
      - "3000:3000"  # REST API
      - "9090:9090"  # Prometheus metrics
    volumes:
      - ./keystore:/app/keystore:ro  # Read-only keystore
      - ./logs:/app/logs             # Logs directory
      - ./cache:/app/cache           # Cache directory
      - ./config.yaml:/app/config.yaml:ro  # Read-only config
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
    env_file:
      - .env
    networks:
      - solana-bot-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"  # Prometheus UI (different port to avoid conflict)
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - solana-bot-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"  # Grafana UI
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - solana-bot-network
    depends_on:
      - prometheus

networks:
  solana-bot-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
